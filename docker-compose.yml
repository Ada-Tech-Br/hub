version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ada-postgres
    environment:
      POSTGRES_USER: ada
      POSTGRES_PASSWORD: ada
      POSTGRES_DB: ada_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ada -d ada_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ada-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://ada:ada@postgres:5432/ada_platform
      # Ficheiros em volumes montados nem sempre disparam inotify; o polling garante --reload no Docker Desktop/WSL.
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ada-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      # O Vite lê isto em vite.config.ts para usar polling no watcher (mesma razão que no backend).
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
